version: "3.8"
services:
  db: # it is the name of the  postgres service inside the docker network
    image: postgres:16-alpine 
    container_name: url_shortener_db
    ports:
      - "5432:5432" # so we can do http://localhost:5432
    environment:
      POSTGRES_DB: url_shortener #these are the variables that are required for connection to the db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
    # to check whether the postgres is running fine and is ready to accept queries or not  
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s 
      timeout: 5s
      retries: 5

  migrate:
    build: ./backend
    container_name: url_shortener_migrate
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123
      DB_NAME: url_shortener
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"   # run once and exit

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123
      DB_NAME: url_shortener
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: url_shortener_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src           # live-reload src changes via Vite HMR
      - ./frontend/public:/app/public     # live-reload public assets
      - ./frontend/index.html:/app/index.html
      - /app/node_modules                 # keep node_modules inside the container
    depends_on:
      - backend
 
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"  

  nginx:
    image: nginx:latest
    container_name: url_shortener_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:

