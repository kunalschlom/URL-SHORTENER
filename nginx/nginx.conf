events {
    worker_connections 1024;
}

http {
    # --- Load-balancing pool: 3 backend instances ---
    upstream backend_pool {
        least_conn;              # route to the instance with fewest active connections
        server backend_1:8000;
        server backend_2:8000;
        server backend_3:8000;
    }

    server {
        listen 80;

        # --- API routes → FastAPI backend pool ---
        location /api/ {
            proxy_pass         http://backend_pool;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Health check route → FastAPI backend pool ---
        location /health {
            proxy_pass         http://backend_pool;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        # --- Short-code redirects (e.g. /abc123) → FastAPI backend pool ---
        # Only matches base62 short codes (letters + digits). This deliberately
        # excludes Vite special paths like /@react-refresh, /@vite/client etc.
        location ~* ^/[a-zA-Z0-9]+$ {
            proxy_pass         http://backend_pool;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Everything else → React frontend (Vite dev server) ---
        location / {
            proxy_pass         http://frontend:5173;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Required for Vite HMR (WebSocket hot reload)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}