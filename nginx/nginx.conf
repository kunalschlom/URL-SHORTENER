events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        # --- API routes → FastAPI backend ---
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Health check route → FastAPI backend ---
        location /health {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        # --- Short-code redirects (e.g. /abc123) → FastAPI backend ---
        # Only matches base62 short codes (letters + digits). This deliberately
        # excludes Vite special paths like /@react-refresh, /@vite/client etc.
        location ~* ^/[a-zA-Z0-9]+$ {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Everything else → React frontend (Vite dev server) ---
        location / {
            proxy_pass         http://frontend:5173;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Required for Vite HMR (WebSocket hot reload)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
} 